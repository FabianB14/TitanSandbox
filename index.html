<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Titan Sandbox</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#22262b;height:100%;
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;-webkit-user-select:none;user-select:none;}
  #game{position:fixed;inset:0;display:block;touch-action:none;}
  #panel{position:fixed;left:10px;top:10px;z-index:10;display:flex;flex-direction:column;gap:6px;
    background:rgba(18,20,24,0.82);border:1px solid rgba(255,255,255,0.10);border-radius:14px;
    padding:10px 8px;backdrop-filter:blur(6px);box-shadow:0 6px 24px rgba(0,0,0,0.45);}
  #panel h1{margin:0 2px 4px 2px;font-size:13px;letter-spacing:2.5px;color:#f2b25c;font-weight:800;
    text-shadow:0 0 10px rgba(255,140,40,0.35);text-align:center;line-height:1.25;}
  #panel button{appearance:none;border:1px solid rgba(255,255,255,0.10);border-radius:9px;
    background:rgba(255,255,255,0.06);color:#d8dce2;font-size:13px;font-weight:600;
    padding:8px 12px;min-width:104px;text-align:left;cursor:pointer;transition:background .12s,transform .05s;
    display:flex;align-items:center;gap:8px;touch-action:manipulation;}
  #panel button:active{transform:scale(0.97);}
  #panel button.active{background:rgba(255,150,50,0.22);border-color:rgba(255,160,60,0.65);color:#ffd9a8;
    box-shadow:0 0 12px rgba(255,140,40,0.25) inset;}
  #panel button .ico{font-size:16px;width:20px;text-align:center;filter:saturate(0.85);}
  #panel .sep{height:1px;background:rgba(255,255,255,0.10);margin:2px 4px;}
  #hint{position:fixed;left:12px;bottom:10px;z-index:10;color:rgba(230,235,240,0.55);font-size:11.5px;
    text-shadow:0 1px 2px rgba(0,0,0,0.6);pointer-events:none;letter-spacing:0.3px;}
  #toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(20,22,26,0.9);
    color:#ffd9a8;border:1px solid rgba(255,160,60,0.5);padding:8px 16px;border-radius:10px;font-size:13px;
    opacity:0;transition:opacity .25s;pointer-events:none;}
  @media (max-height:520px){ #panel{transform:scale(0.85);transform-origin:top left;} }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="panel">
  <h1>TITAN<br>SANDBOX</h1>
  <button data-tool="grab" class="active"><span class="ico">&#9995;</span>Grab</button>
  <button data-tool="titan"><span class="ico">&#129430;</span>Titan</button>
  <button data-tool="ape"><span class="ico">&#129421;</span>Goliath</button>
  <button data-tool="drax"><span class="ico">&#128009;</span>Ravok</button>
  <button data-tool="building"><span class="ico">&#127970;</span>Building</button>
  <button data-tool="bomb"><span class="ico">&#128163;</span>Bomb</button>
  <button data-tool="nuke"><span class="ico">&#9762;</span>A-Bomb</button>
  <button data-tool="breath"><span class="ico">&#128293;</span>Breath</button>
  <button data-tool="car"><span class="ico">&#128663;</span>Car</button>
  <div class="sep"></div>
  <button id="resetBtn"><span class="ico">&#8634;</span>Reset</button>
</div>
<div id="hint">Grab: drag &amp; fling anything &bull; Bomb: 3s fuse &bull; Breath: auto-aims at the nearest block</div>
<div id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script>
'use strict';
/* ============================================================
   TITAN SANDBOX — a 2D kaiju physics sandbox.
   All art is generated in code (offscreen canvases, gradients,
   noise). Original creature design; kaiju-genre inspired only.
   ============================================================ */
(function(){
if(typeof Matter==='undefined'){
  document.getElementById('hint').textContent='Failed to load physics engine (matter.js CDN unreachable).';
  return;
}
const {Engine,Bodies,Body,Composite,Constraint,Query,Vector,Sleeping}=Matter;

/* ---------------- helpers ---------------- */
const TAU=Math.PI*2;
const rand=(a,b)=>a+Math.random()*(b-a);
const randi=(a,b)=>Math.floor(rand(a,b+1));
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
function rot(ang,p){const c=Math.cos(ang),s=Math.sin(ang);return{x:p.x*c-p.y*s,y:p.x*s+p.y*c};}
function mkCanvas(w,h){const c=document.createElement('canvas');c.width=Math.max(2,Math.ceil(w));c.height=Math.max(2,Math.ceil(h));return c;}
function roundRect(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}

/* ---------------- canvas / engine ---------------- */
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
let W=0,H=0,groundY=0,S=1;
const engine=Engine.create({enableSleeping:true,positionIterations:8,velocityIterations:6});
const world=engine.world;
engine.gravity.y=1;

/* ---------------- state ---------------- */
let titans=[],buildings=[],cars=[],bombs=[],nukes=[],particles=[],breakCons=[],ambers=[];
let flash=0;
let tool='grab',grab=null,shake=0,frame=0,nextGroup=-2;
let bgSky=null,bgFar=null,bgNear=null,streetC=null,vignetteC=null,beacons=[];
let groundBody=null;
const MAXP=480;

/* ============================================================
   AUDIO — synthesized WebAudio
   ============================================================ */
let AC=null,noiseB=null,lastSnap=0,lastThud=0;
function audio(){
  if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return;}}
  if(AC.state==='suspended')AC.resume();
}
function noiseBuf(){
  if(noiseB)return noiseB;
  noiseB=AC.createBuffer(1,AC.sampleRate,AC.sampleRate);
  const d=noiseB.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  return noiseB;
}
function boom(){
  if(!AC)return;const t=AC.currentTime;
  const o=AC.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(27,t+0.62);
  const g=AC.createGain();g.gain.setValueAtTime(0.85,t);g.gain.exponentialRampToValueAtTime(0.001,t+1.0);
  o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+1.05);
  const s=AC.createBufferSource();s.buffer=noiseBuf();
  const f=AC.createBiquadFilter();f.type='lowpass';
  f.frequency.setValueAtTime(1100,t);f.frequency.exponentialRampToValueAtTime(110,t+0.55);
  const ng=AC.createGain();ng.gain.setValueAtTime(0.6,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.8);
  s.connect(f);f.connect(ng);ng.connect(AC.destination);s.start(t);s.stop(t+0.85);
}
function roarSnd(){
  if(!AC)return;const t=AC.currentTime;
  for(const det of [0,7]){
    const o=AC.createOscillator();o.type='sawtooth';
    o.frequency.setValueAtTime(95+det,t);
    o.frequency.linearRampToValueAtTime(62+det,t+1.3);
    const g=AC.createGain();g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.16,t+0.08);
    g.gain.setValueAtTime(0.16,t+1.0);g.gain.exponentialRampToValueAtTime(0.001,t+1.45);
    const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=700;
    o.connect(f);f.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+1.5);
  }
  const s=AC.createBufferSource();s.buffer=noiseBuf();s.loop=true;
  const f=AC.createBiquadFilter();f.type='bandpass';f.Q.value=0.8;
  f.frequency.setValueAtTime(300,t);f.frequency.linearRampToValueAtTime(140,t+1.3);
  const g=AC.createGain();g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.22,t+0.1);
  g.gain.setValueAtTime(0.22,t+1.0);g.gain.exponentialRampToValueAtTime(0.001,t+1.45);
  s.connect(f);f.connect(g);g.connect(AC.destination);s.start(t);s.stop(t+1.5);
}
function snapSnd(){
  if(!AC)return;const n=performance.now();if(n-lastSnap<90)return;lastSnap=n;
  const t=AC.currentTime;
  const s=AC.createBufferSource();s.buffer=noiseBuf();
  const f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=1400;
  const g=AC.createGain();g.gain.setValueAtTime(0.10,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
  s.connect(f);f.connect(g);g.connect(AC.destination);s.start(t);s.stop(t+0.07);
}
function thudSnd(v){
  if(!AC)return;const n=performance.now();if(n-lastThud<160)return;lastThud=n;
  const t=AC.currentTime;
  const o=AC.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(85,t);o.frequency.exponentialRampToValueAtTime(34,t+0.16);
  const g=AC.createGain();g.gain.setValueAtTime(clamp(v,0.1,0.5),t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+0.25);
}

/* ============================================================
   PAINTED-SPRITE HELPERS
   ============================================================ */
function speckle(g,w,h,n,alpha){
  for(let i=0;i<n;i++){
    const dark=Math.random()<0.55;
    g.fillStyle=dark?`rgba(18,13,9,${(alpha*Math.random()).toFixed(3)})`
                    :`rgba(214,196,164,${(alpha*0.75*Math.random()).toFixed(3)})`;
    g.beginPath();g.arc(rand(0,w),rand(0,h),rand(0.5,2.1),0,TAU);g.fill();
  }
}
function bumps(g,w,h,n,rmin,rmax){
  for(let i=0;i<n;i++){
    const x=rand(0,w),y=rand(0,h),r=rand(rmin,rmax);
    const gr=g.createRadialGradient(x-r*0.35,y-r*0.45,r*0.12,x,y,r);
    gr.addColorStop(0,'rgba(196,176,150,0.20)');
    gr.addColorStop(0.55,'rgba(70,58,48,0.08)');
    gr.addColorStop(1,'rgba(0,0,0,0.20)');
    g.fillStyle=gr;g.beginPath();g.arc(x,y,r,0,TAU);g.fill();
  }
}
function hideGrad(g,y0,y1,pal){
  const gr=g.createLinearGradient(0,y0,0,y1);
  gr.addColorStop(0,pal.top);
  gr.addColorStop(0.42,pal.mid);
  gr.addColorStop(0.82,pal.low);
  gr.addColorStop(1,pal.deep);
  return gr;
}
function furStreaks(g,w,h,n){
  for(let i=0;i<n;i++){
    const x=rand(0,w),y=rand(0,h),len=rand(5,14);
    const a=Math.PI/2+rand(-0.5,0.5);
    g.strokeStyle=Math.random()<0.5?`rgba(16,11,7,${rand(0.05,0.16).toFixed(3)})`
                                   :`rgba(168,144,116,${rand(0.04,0.12).toFixed(3)})`;
    g.lineWidth=rand(0.8,1.8);
    g.beginPath();g.moveTo(x,y);
    g.quadraticCurveTo(x+Math.cos(a)*len*0.5+rand(-2,2),y+Math.sin(a)*len*0.5,
      x+Math.cos(a)*len,y+Math.sin(a)*len);
    g.stroke();
  }
}
/* jagged bone-white fins with ember glow, drawn "up" along baseline x0..x1 at y */
function finRow(g,x0,x1,y,count,hMax,glow,cols){
  cols=cols||['#f6eeda','#ded2b5','#988c72'];
  if(glow){
    const gr=g.createLinearGradient(0,y-hMax,0,y+6);
    gr.addColorStop(0,`rgba(${glow},0)`);
    gr.addColorStop(0.85,`rgba(${glow},0.22)`);
    gr.addColorStop(1,`rgba(${glow},0)`);
    g.fillStyle=gr;g.fillRect(Math.min(x0,x1)-8,y-hMax,Math.abs(x1-x0)+16,hMax+8);
  }
  for(let i=0;i<count;i++){
    const t=(i+0.5)/count;
    const x=x0+(x1-x0)*t;
    const env=0.5+0.5*Math.sin(t*Math.PI);
    const fh=hMax*(0.45+0.55*env)*rand(0.85,1.1);
    const fw=hMax*0.34*(0.6+0.4*env);
    g.save();
    if(glow){g.shadowColor=`rgba(${glow},0.85)`;g.shadowBlur=13;}
    const gr=g.createLinearGradient(x,y-fh,x,y+2);
    gr.addColorStop(0,cols[0]);gr.addColorStop(0.55,cols[1]);gr.addColorStop(1,cols[2]);
    g.fillStyle=gr;
    g.beginPath();
    g.moveTo(x-fw,y+3);
    g.quadraticCurveTo(x-fw*0.25,y-fh*0.62,x+fw*0.12,y-fh);
    g.quadraticCurveTo(x+fw*0.55,y-fh*0.35,x+fw,y+3);
    g.closePath();g.fill();
    g.restore();
    g.strokeStyle='rgba(60,48,36,0.35)';g.lineWidth=0.8;
    g.beginPath();g.moveTo(x+fw*0.12,y-fh);g.lineTo(x+fw*0.05,y+2);g.stroke();
  }
}
function clawSet(g,x,y,n,cw,chh,dir){ /* dir: 1 down, angled forward */
  for(let i=0;i<n;i++){
    const cx=x+i*cw*1.35;
    const gr=g.createLinearGradient(cx,y,cx,y+chh*dir);
    gr.addColorStop(0,'#cfc3a6');gr.addColorStop(1,'#efe8d2');
    g.fillStyle=gr;
    g.beginPath();
    g.moveTo(cx-cw*0.5,y);
    g.quadraticCurveTo(cx+cw*0.15,y+chh*0.55*dir,cx+cw*0.55,y+chh*dir);
    g.quadraticCurveTo(cx+cw*0.55,y+chh*0.35*dir,cx+cw*0.62,y);
    g.closePath();g.fill();
    g.strokeStyle='rgba(70,58,40,0.4)';g.lineWidth=0.7;g.stroke();
  }
}
function darkVariant(src,amt){
  const c=mkCanvas(src.width,src.height),g=c.getContext('2d');
  g.drawImage(src,0,0);
  g.globalCompositeOperation='source-atop';
  g.fillStyle=`rgba(14,14,24,${amt})`;
  g.fillRect(0,0,c.width,c.height);
  return c;
}

/* ============================================================
   TITAN — dimensions, sprites, ragdoll, muscles
   ============================================================ */
const SPECIES={
  titan:{key:'titan',label:'Titan',fire:true,glow:'255,150,60',
    fin:['#f6eeda','#ded2b5','#988c72'],
    pal:{top:'#6e6152',mid:'#4d4238',low:'#332c25',deep:'#241f1a'},
    z:1,armL:1,legL:1,tailZ:1,horn:false,fur:false,walk:1.5},
  ape:{key:'ape',label:'Goliath',fire:false,glow:null,
    fin:['#3a2f26','#2c231c','#1f1813'],
    pal:{top:'#6b5a48',mid:'#4a3b30',low:'#332822',deep:'#211a14'},
    z:0.97,armL:1.75,legL:0.85,tailZ:0.35,horn:false,fur:true,walk:1.7},
  drax:{key:'drax',label:'Ravok',fire:true,glow:'255,70,45',
    fin:['#e9cbb2','#c9a184','#8a6a52'],
    pal:{top:'#5d6650',mid:'#40493a',low:'#2b3126',deep:'#1d221a'},
    z:1.05,armL:1,legL:1,tailZ:1.1,horn:true,fur:false,walk:1.3},
};
let DIMS={},SPRS={};
function makeDims(spec){
  const s=S*spec.z,D={s:s};
  D.torsoW=(spec.fur?134:118)*s;D.torsoH=(spec.fur?150:162)*s;
  D.headW=(spec.fur?74:94)*s;D.headH=(spec.fur?64:58)*s;
  D.jawW=(spec.fur?48:64)*s;D.jawH=(spec.fur?16:18)*s;
  D.armW=(spec.fur?40:26)*s;D.armH=74*s*spec.armL;
  D.legW=(spec.fur?58:52)*s;D.legH=138*s*spec.legL;
  const tz=spec.tailZ,th2=Math.min(1,tz+0.3);
  D.tail=[[102*s*tz,46*s*th2],[92*s*tz,32*s*th2],[86*s*tz,20*s*th2]];
  D.standH=D.legH+D.torsoH/2-34*s;
  return D;
}
function skinTexture(g,w,h,spec,scaleN,s){
  if(spec.fur)furStreaks(g,w,h,Math.floor(scaleN*4.5));
  else{bumps(g,w,h,scaleN,1.6*s,5.5*s);speckle(g,w,h,scaleN*4,0.16);}
}
/* ---- torso ---- */
function sprTorso(spec,D){
  const s=D.s,pal=spec.pal;
  const bw=D.torsoW,bh=D.torsoH,pad=Math.round(52*s);
  const c=mkCanvas(bw+pad*2,bh+pad*2),g=c.getContext('2d');
  const cx=c.width/2,cy=c.height/2;
  const spineX=cx-bw*0.47;
  /* dorsal fins (glowing bone) or dark fur ridge along the spine */
  g.save();
  g.translate(spineX,cy+bh*0.42);
  g.rotate(-Math.PI/2);
  finRow(g,0,bh*0.85,0,spec.fur?9:7,(spec.fur?20:44)*s,spec.glow,spec.fin);
  g.restore();
  g.beginPath();
  if(spec.fur){
    g.ellipse(cx,cy-bh*0.16,bw*0.52,bh*0.38,0,0,TAU);
    g.ellipse(cx+bw*0.02,cy+bh*0.20,bw*0.45,bh*0.33,0,0,TAU);
  }else{
    g.ellipse(cx,cy-bh*0.06,bw*0.5,bh*0.46,0,0,TAU);
    g.ellipse(cx+bw*0.08,cy+bh*0.26,bw*0.44,bh*0.30,0,0,TAU);
  }
  g.save();g.clip();
  g.fillStyle=hideGrad(g,cy-bh*0.55,cy+bh*0.6,pal);
  g.fillRect(0,0,c.width,c.height);
  let gr=g.createRadialGradient(cx+bw*0.13,cy-bh*0.28,6,cx+bw*0.13,cy-bh*0.28,bw*0.75);
  gr.addColorStop(0,'rgba(214,196,164,0.22)');gr.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=gr;g.fillRect(0,0,c.width,c.height);
  if(spec.fur){
    /* smoother pale chest plate */
    gr=g.createRadialGradient(cx+bw*0.14,cy-bh*0.02,4,cx+bw*0.14,cy-bh*0.02,bw*0.42);
    gr.addColorStop(0,'rgba(150,128,102,0.45)');gr.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=gr;g.fillRect(0,0,c.width,c.height);
  }else{
    for(let i=0;i<6;i++){
      const py=cy-bh*0.02+i*15*s;
      const pw=bw*(0.46-i*0.03),px=cx+bw*0.10;
      const pg=g.createLinearGradient(0,py,0,py+13*s);
      pg.addColorStop(0,'rgba(150,132,105,0.55)');pg.addColorStop(1,'rgba(84,70,56,0.55)');
      g.fillStyle=pg;
      roundRect(g,px-pw*0.5,py,pw,12*s,6*s);g.fill();
      g.strokeStyle='rgba(30,24,18,0.35)';g.lineWidth=1;g.stroke();
    }
  }
  skinTexture(g,c.width,c.height,spec,90,s);
  gr=g.createLinearGradient(0,cy+bh*0.18,0,cy+bh*0.52);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(10,8,6,0.45)');
  g.fillStyle=gr;g.fillRect(0,0,c.width,c.height);
  g.restore();
  g.strokeStyle='rgba(220,205,175,0.30)';g.lineWidth=2.2*s;
  g.beginPath();g.ellipse(cx,cy-bh*(spec.fur?0.16:0.06),bw*0.5-1,bh*(spec.fur?0.38:0.46)-1,0,-2.6,-0.5);g.stroke();
  return {c,ax:cx,ay:cy};
}
/* ---- head ---- */
function sprHead(spec,D){
  const s=D.s,pal=spec.pal;
  const hw=D.headW,hh=D.headH,pad=Math.round(34*s);
  const c=mkCanvas(hw+pad*2,hh+pad*2),g=c.getContext('2d');
  const cx=c.width/2,cy=c.height/2;
  const x0=cx-hw/2,x1=cx+hw/2,y0=cy-hh/2,y1=cy+hh/2;
  if(spec.fur){
    /* great ape: round cranium, heavy brow, leathery muzzle */
    g.beginPath();
    g.ellipse(cx-hw*0.10,cy-hh*0.06,hw*0.44,hh*0.48,0,0,TAU);
    g.ellipse(cx+hw*0.26,cy+hh*0.14,hw*0.30,hh*0.30,0,0,TAU);
    g.save();g.clip();
    g.fillStyle=hideGrad(g,y0-4,y1+4,pal);
    g.fillRect(0,0,c.width,c.height);
    let gr=g.createRadialGradient(cx,y0+hh*0.2,3,cx,y0+hh*0.2,hw*0.7);
    gr.addColorStop(0,'rgba(214,196,164,0.18)');gr.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=gr;g.fillRect(0,0,c.width,c.height);
    furStreaks(g,c.width,c.height,220);
    /* leathery muzzle skin */
    gr=g.createRadialGradient(cx+hw*0.28,cy+hh*0.14,2,cx+hw*0.28,cy+hh*0.14,hw*0.32);
    gr.addColorStop(0,'rgba(126,104,86,0.65)');gr.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=gr;g.fillRect(0,0,c.width,c.height);
    /* brow ridge shadow */
    g.fillStyle='rgba(22,15,11,0.55)';

/* ---- tail segment ---- */
function sprTail(spec,D,idx){

  const c=mkCanvas(twd+pad*2,tht+pad*2),g=c.getContext('2d');

  finRow(g,x0+twd*0.1,x1-twd*0.08,cy-Math.max(hL,hR)/2+2,idx===2?3:4,
    (spec.fur?12:(26-idx*7))*s,spec.glow,spec.fin);
  g.beginPath();
  if(idx===2){
    g.moveTo(x0,cy);
    g.quadraticCurveTo(cx-twd*0.2,cy-hR*0.52,x1,cy-hR*0.5);
    g.quadraticCurveTo(x1+8*s,cy,x1,cy+hR*0.5);

    g.moveTo(x0,cy-hL*0.5);
    g.quadraticCurveTo(cx,cy-hR*0.55,x1,cy-hR*0.5);
    g.quadraticCurveTo(x1+8*s,cy,x1,cy+hR*0.5);
    g.quadraticCurveTo(cx,cy+hR*0.60,x0,cy+hL*0.5);
    g.quadraticCurveTo(x0-6*s,cy,x0,cy-hL*0.5);
  }
  g.closePath();
  g.save();g.clip();
  g.fillStyle=hideGrad(g,cy-tht*0.7,cy+tht*0.7,pal);
  g.fillRect(0,0,c.width,c.height);
  if(spec.fur)furStreaks(g,c.width,c.height,90-idx*20);
  else{bumps(g,c.width,c.height,30-idx*8,1.5*s,4*s);speckle(g,c.width,c.height,120-idx*30,0.15);}
  const gr=g.createLinearGradient(0,cy,0,cy+tht*0.6);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(10,8,6,0.4)');
  g.fillStyle=gr;g.fillRect(0,0,c.width,c.height);
  g.restore();

  con(t.torso,t.legN,tw*0.34,th*0.34,8*s,-lh*0.34,0.22);
  con(t.torso,t.legF,tw*0.03,th*0.42,0,-lh*0.44,0.9);
  con(t.torso,t.legF,tw*0.13,th*0.34,8*s,-lh*0.34,0.22);
  /* tail chain (paired) */
  const tl=D.tail;
  con(t.torso,t.tail1,-tw*0.42,th*0.26,tl[0][0]*0.42,-4*s,0.9);
  con(t.torso,t.tail1,-tw*0.34,th*0.38,tl[0][0]*0.34,8*s,0.28);
  con(t.tail1,t.tail2,-tl[0][0]*0.44,0,tl[1][0]*0.42,-3*s,0.9);
  con(t.tail1,t.tail2,-tl[0][0]*0.36,8*s,tl[1][0]*0.34,6*s,0.26);
  con(t.tail2,t.tail3,-tl[1][0]*0.44,0,tl[2][0]*0.40,-2*s,0.9);
  con(t.tail2,t.tail3,-tl[1][0]*0.36,6*s,tl[2][0]*0.32,5*s,0.24);
  for(const p of t.parts){
    p.plugin={titan:t,titanPart:true};
    p.sleepThreshold=Infinity;
  }
  t.legN.plugin.isLeg=true;t.legF.plugin.isLeg=true;
  t.jaw.plugin.isJaw=true;
  Composite.add(world,t.parts);
  titans.push(t);
  return t;
}
function setFacing(t,f){
  if(t.facing===f)return;
  t.facing=f;
  for(const c of t.joints){
    c.pointA.x=c.plugin.baseA.x*f;
    c.pointB.x=c.plugin.baseB.x*f;
  }
}
function mouthPos(t){
  return Vector.add(t.head.position,rot(t.head.angle,{x:t.facing*t.D.headW*0.42,y:t.D.headH*0.22}));
}
function nudge(b,target,k,max,damp){
  const d=damp!==undefined?damp:0.90;
  const dvx=clamp((target.x-b.position.x)*k,-max,max);
  const dvy=clamp((target.y-b.position.y)*k,-max,max);
  Body.setVelocity(b,{x:b.velocity.x*d+dvx,y:b.velocity.y*d+dvy});
}
function nearestTargetX(t){
  let best=null,bd=1e9;
  for(const bl of buildings){
    if(bl.dead)continue;
    const d=Math.abs(bl.x-t.torso.position.x);
    if(d<bd){bd=d;best=bl.x;}
  }
  return best;
}
const MUS={upright:1,height:1,legs:1,head:1,walk:1,tail:1,arms:1,legAng:1};
window.MUS=MUS;
function muscles(t,now){
  const torso=t.torso;
  const wasActive=t.active;
  t.active=!t.grabbed&&torso.speed<16&&now>t.staggerUntil;
  if(!t.active){t.walk*=0.8;return;}
  if(!wasActive)Sleeping.set(torso,false);
  const breathing=now<t.breathUntil;
  /* upright correction at the position level (velocity-level torque fights
     the stiff joints and leaks sideways momentum) — slight theropod lean */
  if(MUS.upright){Body.setAngularVelocity(torso,torso.angularVelocity*0.80);
  Body.setAngle(torso,torso.angle*0.93+t.facing*0.05*0.07);}
  /* vertical PD spring toward stand height */
  const standY=groundY-t.D.standH;
  const dy=standY-torso.position.y;
  const lift=clamp(dy*0.045-torso.velocity.y*0.18,-1.6,1.3);
  if(MUS.height)Body.setVelocity(torso,{x:torso.velocity.x,y:torso.velocity.y+lift});
  /* pick a direction: stomp toward nearest building */
  let dir=0;
  if(!breathing){
    const bx=nearestTargetX(t);
    if(bx!==null){
      const dx=bx-torso.position.x;
      if(Math.abs(dx)>t.D.torsoW*0.85)dir=Math.sign(dx);
    }
  }
  if(dir!==0&&dir!==t.facing){
    if(now>t.flipCd){setFacing(t,dir);t.flipCd=now+900;}
    else dir=0;
  }
  const wantVx=dir*t.spec.walk*S;
  const vxAdj=dir===0?torso.velocity.x*0.9:torso.velocity.x+clamp(wantVx-torso.velocity.x,-0.30,0.30);
  if(MUS.walk)Body.setVelocity(torso,{x:vxAdj,y:torso.velocity.y});
  if(dir!==0){t.phase+=0.058;t.walk=Math.min(1,t.walk+0.05);}
  else t.walk*=0.92;
  /* head held above shoulders — target measured from the real neck anchor
     so muscles agree with the joint geometry and don't leak momentum */
  const neckW=Vector.add(torso.position,rot(torso.angle,{x:t.facing*14*S,y:-t.D.torsoH*0.46}));
  const htp=Vector.add(neckW,rot(torso.angle,{x:t.facing*30*S,y:-22*S}));
  if(MUS.head){nudge(t.head,htp,0.016,1.2);
  Body.setAngularVelocity(t.head,t.head.angularVelocity*0.80);
  Body.setAngle(t.head,t.head.angle*0.93+torso.angle*0.5*0.07);}
  /* gait: the stiff hip joints keep feet under hips; the muscle only
     hops the swing leg up-and-forward, so ground friction stays honest */
  [t.legN,t.legF].forEach((leg,i)=>{
    const ph=t.phase+i*Math.PI;
    const swing=Math.max(0,Math.cos(ph));
    if(MUS.legs&&t.walk>0.05&&swing>0.3){
      Body.setVelocity(leg,{x:leg.velocity.x+t.facing*0.22*t.walk,
                            y:leg.velocity.y-0.55*swing*t.walk});
    }
    if(MUS.legAng)Body.setAngularVelocity(leg,leg.angularVelocity*0.85);
    /* stomp dust on footfall */
    if(t.walk>0.5&&Math.cos(ph)<-0.96&&leg.position.y>groundY-t.D.legH*0.56){
      dustPuff(leg.position.x+t.facing*t.D.legW*0.4,groundY-4,3);
      thudSnd(0.28);shake=Math.max(shake,2.2);
    }
  });
  /* tail: soft droop, keep it from whipping */
  if(MUS.tail){
    const tl=t.D.tail;
    const off=[t.D.torsoW*0.42+tl[0][0]*0.45,
               t.D.torsoW*0.42+tl[0][0]*0.9+tl[1][0]*0.45,
               t.D.torsoW*0.42+tl[0][0]*0.9+tl[1][0]*0.9+tl[2][0]*0.45];
    [t.tail1,t.tail2,t.tail3].forEach((tb,i)=>{
      const tgt={x:torso.position.x-t.facing*off[i],
                 y:groundY-t.D.tail[i][1]*0.5-(2-i)*16*S};
      nudge(tb,tgt,0.012,0.7,0.96);
      Body.setAngularVelocity(tb,tb.angularVelocity*0.90);
    });
  }
  /* arms tuck slightly forward */
  if(MUS.arms)[t.armN,t.armF].forEach(a=>{
    Body.setAngularVelocity(a,a.angularVelocity*0.88-(a.angle-t.facing*0.25)*0.02);
  });
}
function removeTitan(t){
  releaseBite(t);
  for(const c of t.joints)Composite.remove(world,c);
  for(const p of t.parts)Composite.remove(world,p);
  titans=titans.filter(x=>x!==t);
  if(grab&&grab.body&&grab.body.plugin&&grab.body.plugin.titan===t)releaseGrab();
}

/* ============================================================
   BREATH — auto-aimed ember beam
   ============================================================ */
function triggerBreath(clickP){
  if(!titans.length){toast('Spawn a titan first');return;}
  let t=null,bd=1e9;
  for(const tt of titans){
    const d=dist(tt.torso.position,clickP);
    if(d<bd){bd=d;t=tt;}
  }
  const now=performance.now();
  if(now<t.breathUntil)return;
  /* auto-aim: nearest building or car to the titan */
  const m=t.torso.position;
  let target=null,td=1e9;
  for(const bl of buildings){
    if(bl.dead)continue;
    const p={x:bl.x,y:bl.top+bl.h*0.35};
    const d=Math.abs(p.x-m.x);
    if(d>60&&d<td){td=d;target=p;}
  }
  if(!target)for(const c of cars){
    if(c.plugin.gone)continue;
    const d=Math.abs(c.position.x-m.x);
    if(d>60&&d<td){td=d;target={x:c.position.x,y:c.position.y};}
  }
  if(!target)target={x:m.x+t.facing*420*S,y:groundY-60*S};
  setFacing(t,target.x>m.x?1:-1);
  t.breathTarget=target;
  t.breathUntil=now+1400;
  releaseBite(t);
  roarSnd();
}
function breathStep(t,now){
  if(now>=t.breathUntil){
    if(t.jawSpring.length>3*S)t.jawSpring.length=2*S;
    return;
  }
  t.jawSpring.length=26*S;
  const m=mouthPos(t);
  const aim=Vector.normalise(Vector.sub(t.breathTarget,m));
  const range=540*S;
  const fire=t.spec.fire;
  shake=Math.max(shake,fire?1.6:2.4);
  if(fire){
    /* ember particle stream */
    for(let i=0;i<5;i++){
      const sp=rand(7,13)*S;
      const j=rand(-0.14,0.14);
      const av=rot(j,aim);
      addP({x:m.x+aim.x*18*S,y:m.y+aim.y*18*S,
        vx:av.x*sp+rand(-0.5,0.5),vy:av.y*sp+rand(-0.5,0.5),
        life:randi(22,44),max:44,size:rand(2.5,6)*S,type:'ember'});
    }
    if(Math.random()<0.5){
      addP({x:m.x+aim.x*rand(60,300)*S,y:m.y+aim.y*rand(60,300)*S,
        vx:rand(-0.4,0.4),vy:rand(-1.4,-0.5),life:randi(30,60),max:60,
        size:rand(6,14)*S,type:'smoke'});
    }
  }else{
    /* concussive roar: shock rings + dust along the cone */
    if(frame%4===0){
      addP({x:m.x+aim.x*26*S,y:m.y+aim.y*26*S,
        vx:aim.x*9,vy:aim.y*9,life:26,max:26,size:8*S,type:'shock'});
    }
    if(Math.random()<0.6){
      addP({x:m.x+aim.x*rand(60,320)*S+rand(-14,14),y:m.y+aim.y*rand(60,320)*S+rand(-14,14),
        vx:aim.x*rand(1,3),vy:rand(-1.0,-0.2),life:randi(24,50),max:50,
        size:rand(6,13)*S,type:'dust'});
    }
  }
  /* cone force / char / joint-melting */
  const bodiesAll=Composite.allBodies(world);
  for(const b of bodiesAll){
    if(b===groundBody||(b.plugin&&b.plugin.titan===t))continue;
    const v=Vector.sub(b.position,m);
    const proj=v.x*aim.x+v.y*aim.y;
    if(proj<0||proj>range)continue;
    const perp=Math.abs(v.x*aim.y-v.y*aim.x);
    if(perp>proj*0.34+26*S)continue;
    const f=1-proj/range;
    if(b.plugin&&b.plugin.brick){
      if(fire)b.plugin.char=Math.min(1,b.plugin.char+0.028*f+0.004);
      if(b.isStatic){if(Math.random()<(fire?0.055:0.075)*f)wakeBrick(b);}
    }
    if(!b.isStatic){
      const pw=fire?0.55:0.85;
      Body.setVelocity(b,{x:b.velocity.x+aim.x*pw*f,y:b.velocity.y+aim.y*pw*f-0.08});
      Sleeping.set(b,false);
    }
  }
  for(const c of breakCons){
    if(c.plugin.dead)continue;
    const mid={x:(c.bodyA.position.x+c.bodyB.position.x)/2,y:(c.bodyA.position.y+c.bodyB.position.y)/2};
    const v=Vector.sub(mid,m);
    const proj=v.x*aim.x+v.y*aim.y;
    if(proj<0||proj>range*0.82)continue;
    const perp=Math.abs(v.x*aim.y-v.y*aim.x);
    if(perp>proj*0.30+20*S)continue;
    if(Math.random()<0.075)sever(c);
  }
  t.lastAim=aim;t.lastMouth=m;
}

/* ============================================================
   BUILDINGS — brick grids with architectural facades
   ============================================================ */
const FACADES=[
  {wall:['#bcab8c','#a29172'],trim:'#d6c9ab',glass:['#39434c','#5d6a74']},
  {wall:['#a8a29a','#8d867c'],trim:'#c6bfb2',glass:['#333c44','#57626b']},
  {wall:['#93a3b1','#77899a'],trim:'#b9c4cd',glass:['#2e3a41','#4f5e66']},
  {wall:['#b39c85','#97806a'],trim:'#d0bfa4',glass:['#3a3f46','#5e666e']},
  {wall:['#9aa5a4','#7e8a89'],trim:'#bec8c6',glass:['#30393f','#525f63']},
  {wall:['#af9d90','#93816f'],trim:'#ccbcab',glass:['#363d45','#59636b']}
];
function renderFacade(cols,rows,bw,bh){
  const Wf=cols*bw,Hf=rows*bh;
  const pal=pick(FACADES);
  const c=mkCanvas(Wf,Hf),g=c.getContext('2d');
  let gr=g.createLinearGradient(0,0,0,Hf);
  gr.addColorStop(0,pal.wall[0]);gr.addColorStop(1,pal.wall[1]);
  g.fillStyle=gr;g.fillRect(0,0,Wf,Hf);
  /* masonry texture */
  speckle(g,Wf,Hf,Math.floor(Wf*Hf/110),0.10);
  g.strokeStyle='rgba(0,0,0,0.05)';g.lineWidth=1;
  for(let y=bh;y<Hf;y+=bh){g.beginPath();g.moveTo(0,y+0.5);g.lineTo(Wf,y+0.5);g.stroke();}
  /* corner pilasters */
  gr=g.createLinearGradient(0,0,6,0);
  gr.addColorStop(0,'rgba(255,255,255,0.16)');gr.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=gr;g.fillRect(0,0,6,Hf);
  gr=g.createLinearGradient(Wf-8,0,Wf,0);
  gr.addColorStop(0,'rgba(0,0,0,0)');gr.addColorStop(1,'rgba(0,0,0,0.20)');
  g.fillStyle=gr;g.fillRect(Wf-8,0,8,Hf);
  /* windows: every row is a floor, ground floor gets a doorway */
  const ww=Math.max(8,bw*0.42),wh=bh-9;
  for(let r=1;r<rows;r++){
    const wy=r*bh+4;
    const isGround=(r===rows-1);
    const pitch=ww+9;
    const n=Math.floor((Wf-14)/pitch);
    const x00=(Wf-n*pitch+9)/2;
    for(let i=0;i<n;i++){
      const wx=x00+i*pitch;
      if(isGround&&i===Math.floor(n/2)){
        /* doorway */
        g.fillStyle='#241f1b';
        g.fillRect(wx-1,wy+1,ww+2,bh-5);
        g.beginPath();g.arc(wx+ww/2,wy+1,(ww+2)/2,Math.PI,0);g.fill();
        g.fillStyle='rgba(255,255,255,0.10)';g.fillRect(wx-1,wy+1,ww+2,2);
        continue;
      }
      /* frame */
      g.fillStyle='rgba(30,26,22,0.55)';
      g.fillRect(wx-1.5,wy-1.5,ww+3,wh+3);
      /* glass */
      const lit=Math.random()<0.085;
      if(lit){
        gr=g.createLinearGradient(0,wy,0,wy+wh);
        gr.addColorStop(0,'#f0d489');gr.addColorStop(1,'#c99a4e');
      }else{
        gr=g.createLinearGradient(0,wy,0,wy+wh);
        gr.addColorStop(0,pal.glass[1]);gr.addColorStop(1,pal.glass[0]);
      }
      g.fillStyle=gr;g.fillRect(wx,wy,ww,wh);
      if(!lit){
        g.fillStyle='rgba(255,255,255,0.14)';
        g.fillRect(wx,wy,ww,2);
      }
      /* mullion */
      g.fillStyle='rgba(20,18,16,0.4)';
      g.fillRect(wx+ww/2-0.5,wy,1,wh);
      /* sill */
      g.fillStyle=pal.trim;g.fillRect(wx-2,wy+wh+1,ww+4,2);
    }
  }
  /* cornice ledges every 3 rows */
  for(let r=3;r<rows-1;r+=3){
    const y=r*bh;
    g.fillStyle=pal.trim;g.fillRect(0,y-3,Wf,4);
    g.fillStyle='rgba(0,0,0,0.22)';g.fillRect(0,y+1,Wf,2);
  }
  /* parapet with dentils */
  g.fillStyle=pal.trim;g.fillRect(0,0,Wf,6);
  g.fillStyle='rgba(0,0,0,0.20)';
  for(let x=3;x<Wf-3;x+=8)g.fillRect(x,6,4,3);
  return c;
}
function spawnBuilding(x){
  if(buildings.length>=7){toast('Max buildings');return;}
  const bw=26,bh=22;
  const maxRows=clamp(Math.floor((groundY-90)/bh)-1,6,13);
  const cols=randi(4,6),rows=randi(Math.min(8,maxRows),maxRows);
  const Wb=cols*bw,Hb=rows*bh;
  const facade=renderFacade(cols,rows,bw,bh);
  const x0=clamp(x-Wb/2,130,W-Wb-16);
  const yTop=groundY-Hb;
  const bl={bricks:[],x:x0+Wb/2,h:Hb,top:yTop,dead:false};
  const grid=[];
  for(let r=0;r<rows;r++){
    grid[r]=[];
    for(let c2=0;c2<cols;c2++){
      const b=Bodies.rectangle(x0+c2*bw+bw/2,yTop+r*bh+bh/2,bw,bh,
        {friction:0.7,frictionStatic:0.95,restitution:0.02,density:0.0016,label:'brick'});
      b.plugin={brick:true,sprite:facade,sx:c2*bw,sy:r*bh,w:bw,h:bh,char:0,cons:[],bld:bl};
      Body.setStatic(b,true);
      grid[r][c2]=b;bl.bricks.push(b);
    }
  }
  const link=(A,B,ax,ay,bx,by)=>{
    const c=Constraint.create({bodyA:A,bodyB:B,pointA:{x:ax,y:ay},pointB:{x:bx,y:by},
      length:0,stiffness:0.9,damping:0.1});
    c.plugin={dead:false,brickCon:true};
    A.plugin.cons.push(c);B.plugin.cons.push(c);
    breakCons.push(c);Composite.add(world,c);
  };
  for(let r=0;r<rows;r++)for(let c2=0;c2<cols;c2++){
    if(c2+1<cols)link(grid[r][c2],grid[r][c2+1],bw/2,(r%2?-6:6),-bw/2,(r%2?-6:6));
    if(r+1<rows)link(grid[r][c2],grid[r+1][c2],(c2%2?-8:8),bh/2,(c2%2?-8:8),-bh/2);
  }
  Composite.add(world,bl.bricks);
  buildings.push(bl);
}
function wakeBrick(b){
  if(b.plugin&&b.plugin.brick&&b.isStatic){
    Body.setStatic(b,false);
    Sleeping.set(b,false);
  }
}
function sever(c){
  if(c.plugin.dead)return;
  c.plugin.dead=true;
  Composite.remove(world,c);
  if(c.bodyA)wakeBrick(c.bodyA);
  if(c.bodyB)wakeBrick(c.bodyB);
  snapSnd();
}
function checkConstraints(){
  for(let i=breakCons.length-1;i>=0;i--){
    const c=breakCons[i];
    if(c.plugin.dead){breakCons.splice(i,1);continue;}
    const A=c.bodyA,B=c.bodyB;
    if(A.isStatic&&B.isStatic)continue;
    const wa=Vector.add(A.position,rot(A.angle,c.pointA));
    const wb=Vector.add(B.position,rot(B.angle,c.pointB));
    if(dist(wa,wb)>13){sever(c);breakCons.splice(i,1);}
  }
}

function nukeSprite(){
  const c=mkCanvas(34,64),g=c.getContext('2d');
  const cx=17;
  /* casing */
  let gr=g.createLinearGradient(cx-9,0,cx+9,0);
  gr.addColorStop(0,'#a8adb5');gr.addColorStop(0.45,'#7d838c');gr.addColorStop(1,'#4c5158');
  g.fillStyle=gr;
  g.beginPath();
  g.moveTo(cx-9,14);
  g.quadraticCurveTo(cx-9,54,cx,60);
  g.quadraticCurveTo(cx+9,54,cx+9,14);
  g.quadraticCurveTo(cx,8,cx-9,14);
  g.closePath();g.fill();
  /* tail fins */
  g.fillStyle='#5b6068';
  g.beginPath();g.moveTo(cx-9,16);g.lineTo(cx-16,2);g.lineTo(cx-4,10);g.closePath();g.fill();
  g.beginPath();g.moveTo(cx+9,16);g.lineTo(cx+16,2);g.lineTo(cx+4,10);g.closePath();g.fill();
  g.fillStyle='#6b7078';g.fillRect(cx-2,2,4,12);
  /* hazard band */
  g.fillStyle='#d8b13c';g.fillRect(cx-9,30,18,8);
  g.fillStyle='#26282c';
  for(let x=cx-9;x<cx+9;x+=6)g.fillRect(x,30,3,8);
  /* nose shine */
  g.fillStyle='rgba(255,255,255,0.25)';g.fillRect(cx-6,16,3,34);
  return c;
}
let nukeSpr=null;
function spawnNuke(x){
  if(nukes.length){toast('One warhead at a time');return;}
  if(!nukeSpr)nukeSpr=nukeSprite();
  const b=Bodies.rectangle(clamp(x,70,W-70),-60,18,48,
    {density:0.006,friction:0.4,restitution:0,label:'nuke'});
  b.plugin={nuke:true};
  Body.setVelocity(b,{x:0,y:5});
  Composite.add(world,b);nukes.push(b);
  toast('Warhead inbound');
}
function detonateNuke(b){
  if(!nukes.includes(b))return;
  nukes=nukes.filter(x=>x!==b);
  Composite.remove(world,b);
  nukeExplode(b.position.x,Math.min(b.position.y,groundY-12));
}
function nukeSnd(){
  if(!AC)return;const t=AC.currentTime;
  const o=AC.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(58,t);o.frequency.exponentialRampToValueAtTime(16,t+2.2);
  const g=AC.createGain();g.gain.setValueAtTime(1.0,t);g.gain.exponentialRampToValueAtTime(0.001,t+3.0);
  o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+3.1);
  const s=AC.createBufferSource();s.buffer=noiseBuf();s.loop=true;
  const f=AC.createBiquadFilter();f.type='lowpass';
  f.frequency.setValueAtTime(600,t);f.frequency.exponentialRampToValueAtTime(55,t+2.6);
  const ng=AC.createGain();ng.gain.setValueAtTime(0.8,t);ng.gain.exponentialRampToValueAtTime(0.001,t+3.2);
  s.connect(f);f.connect(ng);ng.connect(AC.destination);s.start(t);s.stop(t+3.3);
  const cr=AC.createBufferSource();cr.buffer=noiseBuf();
  const cf=AC.createBiquadFilter();cf.type='highpass';cf.frequency.value=700;
  const cg=AC.createGain();cg.gain.setValueAtTime(0.5,t);cg.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  cr.connect(cf);cf.connect(cg);cg.connect(AC.destination);cr.start(t);cr.stop(t+0.2);
}
function nukeExplode(x,y){
  flash=1.5;
  shake=Math.min(70,shake+62);
  nukeSnd();
  const R=470,pt={x,y};
  addP({x,y,vx:0,vy:0,life:14,max:14,size:R*0.7,type:'flash'});
  for(const b of Composite.allBodies(world)){
    if(b===groundBody)continue;
    const d=dist(b.position,pt);
    if(b.plugin&&b.plugin.brick&&d<R*1.15){
      b.plugin.char=Math.min(1,b.plugin.char+(1-d/(R*1.2))*1.4);
      wakeBrick(b);
    }
    if(d<R&&!b.isStatic){
      const fq=1-d/R;
      const dv=Vector.normalise(Vector.sub(b.position,pt));
      Body.setVelocity(b,{x:b.velocity.x+dv.x*26*fq,y:b.velocity.y+dv.y*26*fq-6*fq});
      Sleeping.set(b,false);
    }
  }
  for(const c of breakCons){
    if(c.plugin.dead)continue;
    const mid={x:(c.bodyA.position.x+c.bodyB.position.x)/2,y:(c.bodyA.position.y+c.bodyB.position.y)/2};
    if(dist(mid,pt)<R*1.05)sever(c);
  }
  const now=performance.now();
  for(const t of titans){
    if(dist(t.torso.position,pt)<R*2.6){
      t.staggerUntil=now+3000;
      releaseBite(t);
    }
  }
  /* mushroom cloud: rising stem + spreading cap + ground ring */
  for(let i=0;i<44;i++)
    addP({x:x+rand(-24,24),y:groundY-rand(0,60),vx:rand(-0.25,0.25),vy:rand(-4.0,-2.2),
      life:randi(150,230),max:230,size:rand(16,28),type:'nukestem'});
  for(let i=0;i<44;i++)
    addP({x:x+rand(-80,80),y:groundY-rand(250,345),vx:rand(-0.8,0.8),vy:rand(-1.4,-0.4),
      life:randi(170,280),max:280,size:rand(28,56),type:'nukecap'});
  for(let i=0;i<14;i++)
    addP({x:x+rand(-30,30),y:groundY-rand(20,120),vx:rand(-0.4,0.4),vy:rand(-3.0,-1.6),
      life:randi(40,90),max:90,size:rand(8,18),type:'ember'});
  for(let i=0;i<16;i++){
    const d2=Math.random()<0.5?-1:1;
    addP({x,y:groundY-6,vx:d2*rand(4,10),vy:rand(-0.6,0),life:randi(40,80),max:80,
      size:rand(10,20),type:'dust'});
  }
  for(let i=0;i<40;i++){
    const a=rand(-Math.PI,0),sp=rand(3,15);
    addP({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:randi(30,80),max:80,
      size:rand(2,5),type:'ember'});
  }
}
function explode(x,y,R,power){
  R=R||175;power=power||15;
  shake=Math.min(34,shake+24);
  boom();
  addP({x,y,vx:0,vy:0,life:9,max:9,size:R*0.55,type:'flash'});
  for(let i=0;i<26;i++){
    const a=rand(0,TAU),sp=rand(2,9);
    addP({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:randi(20,42),max:42,
      size:rand(2,5),type:'ember'});
  }
  for(let i=0;i<14;i++){
    const a=rand(0,TAU),sp=rand(0.5,3);
    addP({x:x+rand(-14,14),y:y+rand(-14,14),vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.2,
      life:randi(45,90),max:90,size:rand(9,22),type:'smoke'});
  }
  for(let i=0;i<10;i++){
    const a=rand(-Math.PI,0),sp=rand(3,10);
    addP({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:randi(30,70),max:70,
      size:rand(2,4.5),type:'debris',rot:rand(0,TAU),vr:rand(-0.3,0.3)});
  }
  const pt={x,y};
  for(const b of Composite.allBodies(world)){
    if(b===groundBody)continue;
    const d=dist(b.position,pt);
    if(d<R*1.08&&b.plugin&&b.plugin.brick){
      b.plugin.char=Math.min(1,b.plugin.char+(1-d/(R*1.1))*0.95);
      wakeBrick(b);
    }
    if(d<R&&!b.isStatic){
      const f=1-d/R;
      const dv=Vector.normalise(Vector.sub(b.position,pt));
      Body.setVelocity(b,{x:b.velocity.x+dv.x*power*f,y:b.velocity.y+dv.y*power*f-3.2*f});
      Sleeping.set(b,false);
    }
  }
  for(const c of breakCons){
    if(c.plugin.dead)continue;
    const mid={x:(c.bodyA.position.x+c.bodyB.position.x)/2,y:(c.bodyA.position.y+c.bodyB.position.y)/2};
    if(dist(mid,pt)<R*0.92)sever(c);
  }
  const now=performance.now();
  for(const t of titans){
    if(dist(t.torso.position,pt)<R*2.1){
      t.staggerUntil=now+1500;
      releaseBite(t);
    }
  }
}

/* ---- jaw bite: weak constraint when jaw touches a car ---- */
function releaseBite(t){
  if(t.bite){Composite.remove(world,t.bite.cons);
    if(t.bite.car.plugin)t.bite.car.plugin.bittenBy=null;
    t.bite=null;t.biteCd=performance.now()+1200;}
}
function tryBite(t,car){
  const now=performance.now();
  if(t.bite||now<t.biteCd||now<t.breathUntil||!t.active)return;
  if(car.plugin.bittenBy)return;
  const cons=Constraint.create({bodyA:t.jaw,bodyB:car,
    pointA:{x:t.facing*t.D.jawW*0.28,y:0},pointB:{x:0,y:0},
    length:4,stiffness:0.18,damping:0.08});
  Composite.add(world,cons);
  t.bite={cons,car};
  car.plugin.bittenBy=t;
  t.jawSpring.length=14*S;
  setTimeout(()=>{if(!t.bite)t.jawSpring.length=2*S;},400);
}

/* ============================================================
   COLLISIONS
   ============================================================ */
Matter.Events.on(engine,'collisionStart',e=>{
  for(const pair of e.pairs){
    const A=pair.bodyA,B=pair.bodyB;
    const rel=Math.hypot(A.velocity.x-B.velocity.x,A.velocity.y-B.velocity.y);
    if(rel>2.5&&(A.label==='nuke'||B.label==='nuke')){
      detonateNuke(A.label==='nuke'?A:B);
      continue;
    }
    for(const [b,o] of [[A,B],[B,A]]){
      const p=b.plugin,po=o.plugin;
      if(!p)continue;
      /* wake static bricks on meaningful impact */
      if(p.brick&&b.isStatic){
        if((po&&po.titanPart&&rel>1.3)||(!o.isStatic&&rel>3.2))wakeBrick(b);
      }
      /* stomp thud + dust */
      if(p.isLeg&&o===groundBody&&rel>3){
        dustPuff(b.position.x,groundY-4,4);thudSnd(0.35);
      }
      /* jaw bites cars */
      if(p.isJaw&&po&&po.car)tryBite(p.titan,o);
      /* hard impact releases a bitten car */
      if(p.car&&p.bittenBy&&rel>9&&!(po&&po.titan===p.bittenBy)){
        releaseBite(p.bittenBy);
      }
      /* debris dust for fast bricks hitting things */
      if(p.brick&&!b.isStatic&&rel>7&&Math.random()<0.4){
        dustPuff(b.position.x,b.position.y,2);
      }
    }
  }
});

/* ============================================================
   PARTICLES
   ============================================================ */
function addP(p){
  if(particles.length>=MAXP)particles.splice(0,particles.length-MAXP+1);
  particles.push(p);
}
function dustPuff(x,y,n){
  for(let i=0;i<n;i++){
    addP({x:x+rand(-10,10),y:y+rand(-4,4),vx:rand(-1.4,1.4),vy:rand(-1.6,-0.3),
      life:randi(25,50),max:50,size:rand(5,13),type:'dust'});
  }
}
function stepParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.type==='smoke'){p.vy-=0.045;p.vx*=0.985;p.size*=1.018;}
    else if(p.type==='dust'){p.vy-=0.02;p.vx*=0.97;p.size*=1.012;}
    else if(p.type==='ember'){p.vy+=0.06;p.vx*=0.985;}
    else if(p.type==='debris'){p.vy+=0.32;p.rot+=p.vr;
      if(p.y>groundY-2){p.y=groundY-2;p.vy*=-0.3;p.vx*=0.7;}}
    else if(p.type==='shock'){p.size*=1.16;p.vx*=0.9;p.vy*=0.9;}
    else if(p.type==='nukestem'){p.vy*=0.996;p.vx*=0.985;p.size*=1.008;}
    else if(p.type==='nukecap'){p.vy*=0.992;p.vx*=0.995;p.size*=1.006;}
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    const a=p.life/p.max;
    if(p.type==='shock'){
      ctx.strokeStyle=`rgba(230,236,242,${(a*0.55).toFixed(3)})`;
      ctx.lineWidth=2.2;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.stroke();
    }else if(p.type==='smoke'||p.type==='dust'||p.type==='nukestem'||p.type==='nukecap'){
      const col=p.type==='smoke'?'70,66,62':
                p.type==='dust'?'148,138,120':
                p.type==='nukestem'?'88,72,58':'112,100,90';
      const aa=a*(p.type==='smoke'?0.36:p.type==='dust'?0.42:0.62);
      const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
      gr.addColorStop(0,`rgba(${col},${aa.toFixed(3)})`);
      gr.addColorStop(0.7,`rgba(${col},${(aa*0.55).toFixed(3)})`);
      gr.addColorStop(1,`rgba(${col},0)`);
      ctx.fillStyle=gr;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
    }else if(p.type==='ember'){
      ctx.globalCompositeOperation='lighter';
      const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*2.2);
      gr.addColorStop(0,`rgba(255,220,150,${(a*0.9).toFixed(3)})`);
      gr.addColorStop(0.4,`rgba(255,140,50,${(a*0.55).toFixed(3)})`);
      gr.addColorStop(1,'rgba(255,90,30,0)');
      ctx.fillStyle=gr;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*2.2,0,TAU);ctx.fill();
      ctx.globalCompositeOperation='source-over';
    }else if(p.type==='debris'){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=`rgba(90,80,70,${a.toFixed(3)})`;
      ctx.fillRect(-p.size,-p.size*0.6,p.size*2,p.size*1.2);
      ctx.restore();
    }else if(p.type==='flash'){
      ctx.globalCompositeOperation='lighter';
      const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
      gr.addColorStop(0,`rgba(255,240,200,${(a*0.95).toFixed(3)})`);
      gr.addColorStop(0.5,`rgba(255,150,60,${(a*0.5).toFixed(3)})`);
      gr.addColorStop(1,'rgba(255,90,30,0)');
      ctx.fillStyle=gr;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,TAU);ctx.fill();
      ctx.globalCompositeOperation='source-over';
    }
  }
}

/* ============================================================
   BACKGROUND — hazy old-city, parallax, lattice tower
   ============================================================ */
function buildBackground(){
  beacons=[];
  /* sky + sun */
  bgSky=mkCanvas(W,H);
  {
    const g=bgSky.getContext('2d');
    const gr=g.createLinearGradient(0,0,0,groundY);
    gr.addColorStop(0,'#b9cbd9');
    gr.addColorStop(0.55,'#ccd6da');
    gr.addColorStop(0.85,'#ddd9cc');
    gr.addColorStop(1,'#e4dcc9');
    g.fillStyle=gr;g.fillRect(0,0,W,H);
    const sx=W*0.74,sy=H*0.20;
    let sg=g.createRadialGradient(sx,sy,4,sx,sy,H*0.42);
    sg.addColorStop(0,'rgba(255,248,225,0.95)');
    sg.addColorStop(0.18,'rgba(255,240,205,0.45)');
    sg.addColorStop(1,'rgba(255,240,205,0)');
    g.fillStyle=sg;g.fillRect(0,0,W,H);
    /* faint cloud bands */
    for(let i=0;i<5;i++){
      const cy=rand(H*0.08,H*0.45),cw=rand(W*0.2,W*0.5);
      const cg=g.createLinearGradient(0,cy-8,0,cy+10);
      cg.addColorStop(0,'rgba(255,255,255,0)');
      cg.addColorStop(0.5,'rgba(255,255,255,0.16)');
      cg.addColorStop(1,'rgba(255,255,255,0)');
      g.fillStyle=cg;
      g.fillRect(rand(-40,W-cw),cy-8,cw,18);
    }
  }
  /* far layer: palest silhouettes */
  bgFar=mkCanvas(W,H);
  {
    const g=bgFar.getContext('2d');
    g.fillStyle='#b3c2ce';
    let x=-30;
    while(x<W+40){
      const bw=rand(50,110),bh=rand(H*0.08,H*0.22);
      g.globalAlpha=rand(0.5,0.75);
      g.fillRect(x,groundY-bh,bw,bh);
      x+=bw+rand(4,26);
    }
    g.globalAlpha=1;
    const hz=g.createLinearGradient(0,groundY-H*0.16,0,groundY);
    hz.addColorStop(0,'rgba(226,222,206,0)');
    hz.addColorStop(1,'rgba(226,222,206,0.85)');
    g.fillStyle=hz;g.fillRect(0,groundY-H*0.16,W,H*0.16);
  }
  /* near-back layer: deeper tone + lattice radio tower */
  bgNear=mkCanvas(W,H);
  {
    const g=bgNear.getContext('2d');
    let x=-20;
    while(x<W+40){
      const bw=rand(60,130),bh=rand(H*0.14,H*0.34);
      const tone=randi(0,2);
      g.fillStyle=['#9db0bf','#a3b1ba','#97a8b8'][tone];
      g.globalAlpha=rand(0.75,0.95);
      g.fillRect(x,groundY-bh,bw,bh);
      /* faint window grid */
      g.fillStyle='rgba(50,62,74,0.14)';
      for(let wy=groundY-bh+8;wy<groundY-10;wy+=13)
        for(let wx=x+6;wx<x+bw-8;wx+=11)
          g.fillRect(wx,wy,4,6);
      /* rooftop antenna on some */
      if(Math.random()<0.3&&bh>H*0.2){
        g.strokeStyle='rgba(120,132,142,0.9)';g.lineWidth=2;
        g.beginPath();g.moveTo(x+bw/2,groundY-bh);g.lineTo(x+bw/2,groundY-bh-22);g.stroke();
        beacons.push({x:x+bw/2,y:groundY-bh-24,phase:rand(0,2)});
      }
      x+=bw+rand(8,34);
    }
    g.globalAlpha=1;
    /* lattice tower */
    const tx=W*0.16,th=H*0.42,ty=groundY,tw=H*0.075;
    g.strokeStyle='rgba(112,124,136,0.95)';g.lineWidth=2.4;
    g.beginPath();
    g.moveTo(tx-tw,ty);g.lineTo(tx-tw*0.16,ty-th);
    g.moveTo(tx+tw,ty);g.lineTo(tx+tw*0.16,ty-th);
    g.stroke();
    g.lineWidth=1.3;
    for(let i=0;i<8;i++){
      const f0=i/8,f1=(i+1)/8;
      const y0=ty-th*f0,y1=ty-th*f1;

      g.moveTo(tx-w0,y0);g.lineTo(tx+w1,y1);
      g.moveTo(tx+w0,y0);g.lineTo(tx-w1,y1);
      g.moveTo(tx-w0,y0);g.lineTo(tx+w0,y0);
      g.stroke();
    }
    g.lineWidth=2.2;
    g.beginPath();g.moveTo(tx,ty-th);g.lineTo(tx,ty-th-H*0.055);g.stroke();

    g.fillStyle='rgba(0,0,0,0.25)';g.fillRect(0,7,W,2);
    g.fillStyle='rgba(210,190,130,0.65)';
    for(let x=10;x<W;x+=64)g.fillRect(x,26,28,4);
    speckle(g,W,streetC.height,Math.floor(W/3),0.08);
  }
  /* vignette + gentle warm haze overlay */
  vignetteC=mkCanvas(W,H);
  {
    const g=vignetteC.getContext('2d');
    const gr=g.createRadialGradient(W/2,H*0.42,Math.min(W,H)*0.42,W/2,H*0.55,Math.max(W,H)*0.82);
    gr.addColorStop(0,'rgba(0,0,0,0)');
    gr.addColorStop(1,'rgba(24,20,28,0.26)');
    g.fillStyle=gr;g.fillRect(0,0,W,H);
  }
}
function drawBeacons(now){
  for(const b of beacons){
    const on=((now/1000+b.phase)%1.5)<0.22;
    if(!on)continue;
    ctx.globalCompositeOperation='lighter';
    const gr=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,9);
    gr.addColorStop(0,'rgba(255,80,70,0.95)');
    gr.addColorStop(1,'rgba(255,60,50,0)');
    ctx.fillStyle=gr;
    ctx.beginPath();ctx.arc(b.x,b.y,9,0,TAU);ctx.fill();
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='#ff5a48';
    ctx.beginPath();ctx.arc(b.x,b.y,2,0,TAU);ctx.fill();
  }
}

/* ============================================================

function drawSprite(b,spr,flip){
  ctx.save();
  ctx.translate(b.position.x,b.position.y);
  ctx.rotate(b.angle);
  if(flip===-1)ctx.scale(-1,1);
  ctx.drawImage(spr.c,-spr.ax,-spr.ay);
  ctx.restore();
}
function drawBrick(b){
  const p=b.plugin;
  ctx.save();
  ctx.translate(b.position.x,b.position.y);
  ctx.rotate(b.angle);
  ctx.drawImage(p.sprite,p.sx,p.sy,p.w,p.h,-p.w/2,-p.h/2,p.w,p.h);
  if(p.char>0.02){
    ctx.fillStyle=`rgba(16,11,8,${(p.char*0.85).toFixed(3)})`;
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
  }
  if(!b.isStatic){
    ctx.strokeStyle='rgba(20,16,12,0.45)';ctx.lineWidth=1;
    ctx.strokeRect(-p.w/2+0.5,-p.h/2+0.5,p.w-1,p.h-1);
  }
  ctx.restore();
}
function drawTitanReal(t,now){
  const f=t.facing,D=t.D,SP=t.SP,pal=t.spec.pal;
  const anchor=(b,dx,dy)=>Vector.add(b.position,rot(b.angle,{x:f*dx,y:dy}));
  const join=(a,b,wd)=>{
    ctx.lineCap='round';
    ctx.strokeStyle=pal.deep;ctx.lineWidth=wd;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    ctx.strokeStyle=pal.mid;ctx.lineWidth=wd*0.72;
    ctx.beginPath();ctx.moveTo(a.x-2*S,a.y-3*S);ctx.lineTo(b.x-2*S,b.y-3*S);ctx.stroke();
  };
  /* tail: joins first so segments read as one continuous tail */
  join(anchor(t.tail2,-D.tail[1][0]*0.30,0),anchor(t.tail3,D.tail[2][0]*0.30,0),D.tail[2][1]*0.95);
  join(anchor(t.tail1,-D.tail[0][0]*0.30,0),anchor(t.tail2,D.tail[1][0]*0.30,0),D.tail[1][1]*0.95);
  join(anchor(t.torso,-D.torsoW*0.40,D.torsoH*0.26),anchor(t.tail1,D.tail[0][0]*0.30,0),D.tail[0][1]*0.95);
  drawSprite(t.tail3,SP.tail2,f);
  drawSprite(t.tail2,SP.tail1,f);
  drawSprite(t.tail1,SP.tail0,f);
  /* far limbs, blended into the torso with shoulder/hip flesh */
  join(anchor(t.torso,D.torsoW*0.20,-D.torsoH*0.20),anchor(t.armF,0,-D.armH*0.34),D.armW*0.85);
  drawSprite(t.armF,SP.armFar,f);
  join(anchor(t.torso,D.torsoW*0.03,D.torsoH*0.36),anchor(t.legF,0,-D.legH*0.30),D.legW*0.85);
  drawSprite(t.legF,SP.legFar,f);
  drawSprite(t.torso,SP.torso,f);
  join(anchor(t.torso,D.torsoW*0.24,D.torsoH*0.36),anchor(t.legN,0,-D.legH*0.30),D.legW*0.9);
  drawSprite(t.legN,SP.leg,f);
  join(anchor(t.torso,D.torsoW*0.36,-D.torsoH*0.18),anchor(t.armN,0,-D.armH*0.34),D.armW*0.9);
  drawSprite(t.armN,SP.arm,f);
  /* painted neck bridging torso and head */
  const nA=anchor(t.torso,16*S,-D.torsoH*0.36);
  const nB=Vector.add(t.head.position,rot(t.head.angle,{x:-f*D.headW*0.22,y:D.headH*0.22}));
  ctx.lineCap='round';
  ctx.strokeStyle=pal.deep;ctx.lineWidth=46*D.s;
  ctx.beginPath();ctx.moveTo(nA.x,nA.y);ctx.lineTo(nB.x,nB.y);ctx.stroke();
  ctx.strokeStyle=pal.mid;ctx.lineWidth=38*D.s;
  ctx.beginPath();ctx.moveTo(nA.x-2*S,nA.y-4*S);ctx.lineTo(nB.x-2*S,nB.y-4*S);ctx.stroke();
  ctx.strokeStyle=pal.top;ctx.lineWidth=18*D.s;
  ctx.beginPath();ctx.moveTo(nA.x-4*S,nA.y-9*S);ctx.lineTo(nB.x-3*S,nB.y-8*S);ctx.stroke();
  drawSprite(t.jaw,SP.jaw,f);
  drawSprite(t.head,SP.head,f);
  /* living ember glow pulsing along the spine (species with glow only) */
  const breathing=now<t.breathUntil;
  if(t.spec.glow){
    const pulse=0.05+0.035*Math.sin(now/240)+(breathing?0.10:0);
    ctx.globalCompositeOperation='lighter';
    const spinePts=[
      anchor(t.torso,-D.torsoW*0.45,-D.torsoH*0.25),
      anchor(t.torso,-D.torsoW*0.48,D.torsoH*0.05),
      Vector.add(t.tail1.position,rot(t.tail1.angle,{x:0,y:-D.tail[0][1]*0.5})),
      Vector.add(t.tail2.position,rot(t.tail2.angle,{x:0,y:-D.tail[1][1]*0.5}))
    ];
    for(const p of spinePts){
      const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,34*D.s);
      gr.addColorStop(0,`rgba(${t.spec.glow},${pulse.toFixed(3)})`);
      gr.addColorStop(1,`rgba(${t.spec.glow},0)`);
      ctx.fillStyle=gr;
      ctx.beginPath();ctx.arc(p.x,p.y,34*D.s,0,TAU);ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
  }
  /* breath visuals */
  if(breathing&&t.lastAim){
    const m=t.lastMouth,aim=t.lastAim;
    ctx.globalCompositeOperation='lighter';
    if(t.spec.fire){
      const len=470*S,glow=t.spec.glow;
      for(const [wdt,col] of [[26*S,`rgba(${glow},0.10)`],[13*S,`rgba(${glow},0.20)`],[5*S,'rgba(255,220,150,0.38)']]){
        ctx.strokeStyle=col;ctx.lineWidth=wdt;ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(m.x,m.y);
        const wob=Math.sin(now/45)*9*S;
        const px=-aim.y,py=aim.x;
        ctx.quadraticCurveTo(
          m.x+aim.x*len*0.5+px*wob,m.y+aim.y*len*0.5+py*wob,
          m.x+aim.x*len,m.y+aim.y*len);
        ctx.stroke();
      }
      const gr=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,30*S);
      gr.addColorStop(0,'rgba(255,230,170,0.8)');
      gr.addColorStop(1,`rgba(${glow},0)`);
      ctx.fillStyle=gr;
      ctx.beginPath();ctx.arc(m.x,m.y,30*S,0,TAU);ctx.fill();
    }else{
      /* concussive roar: expanding shock arcs from the mouth */
      const ang=Math.atan2(aim.y,aim.x);
      for(const off of [0,0.34,0.67]){
        const p2=((now/420)+off)%1;
        const r=p2*300*S;
        ctx.strokeStyle=`rgba(235,240,245,${(0.45*(1-p2)).toFixed(3)})`;
        ctx.lineWidth=2.5+5*p2;
        ctx.beginPath();ctx.arc(m.x,m.y,Math.max(2,r),ang-0.5,ang+0.5);ctx.stroke();
      }
    }
    ctx.globalCompositeOperation='source-over';
  }
}
function drawCar(b){
  const spr=b.plugin.sprite;
  ctx.save();
  ctx.translate(b.position.x,b.position.y);
  ctx.rotate(b.angle);
  ctx.drawImage(spr,-28,-15);
  ctx.restore();
}
function drawBomb(b,now){
  ctx.save();
  ctx.translate(b.position.x,b.position.y);
  ctx.rotate(b.angle);
  ctx.drawImage(bombSpr,-18,-21);
  ctx.restore();
  /* fuse countdown ring */
  const rem=1-(now-b.plugin.born)/b.plugin.fuse;
  ctx.strokeStyle='rgba(255,90,40,0.9)';
  ctx.lineWidth=3;
  ctx.beginPath();
  ctx.arc(b.position.x,b.position.y,21,-Math.PI/2,-Math.PI/2+TAU*Math.max(0,rem));
  ctx.stroke();
  /* fuse spark */
  if(Math.random()<0.8){
    addP({x:b.position.x+rand(-2,2),y:b.position.y-19+rand(-2,2),
      vx:rand(-0.6,0.6),vy:rand(-1.2,-0.2),life:randi(4,10),max:10,size:rand(1.2,2.6),type:'ember'});
  }
}

/* ============================================================
   WORLD MGMT
   ============================================================ */
function buildStatics(){
  groundBody=Bodies.rectangle(W/2,groundY+206,W+1600,412,{isStatic:true,label:'ground',friction:0.9});
  Composite.add(world,groundBody);
}
function cull(){
  const all=Composite.allBodies(world);
  for(const b of all){
    if(b.isStatic&&!b.plugin)continue;
    if(b===groundBody)continue;
    const p=b.position;
    if(p.y>H+520||p.x<-680||p.x>W+680){
      const pl=b.plugin||{};
      if(pl.titanPart){
        if(b===pl.titan.torso)removeTitan(pl.titan);
        continue;
      }
      if(pl.brick){
        for(const c of pl.cons)sever(c);
        pl.gone=true;
        if(pl.bld)pl.bld.bricks=pl.bld.bricks.filter(x=>x!==b);
      }
      if(pl.car){
        pl.gone=true;
        if(pl.bittenBy)releaseBite(pl.bittenBy);
        cars=cars.filter(x=>x!==b);
      }
      if(pl.bomb)bombs=bombs.filter(x=>x!==b);
      if(pl.nuke)nukes=nukes.filter(x=>x!==b);
      if(grab&&grab.body===b)releaseGrab();
      Composite.remove(world,b);
    }
  }
  for(const bl of buildings){
    if(!bl.dead){
      const alive=bl.bricks.length;
      if(alive<6)bl.dead=true;
      else{
        let sx=0;for(const b of bl.bricks)sx+=b.position.x;
        bl.x=sx/alive;
      }
    }
  }
  buildings=buildings.filter(b=>!b.dead||b.bricks.length>0);
}
function resetWorld(){
  Composite.clear(world,false);
  titans=[];buildings=[];cars=[];bombs=[];nukes=[];particles=[];breakCons=[];
  grab=null;shake=0;flash=0;nextGroup=-2;
  buildStatics();
  defaultScene();
}
function defaultScene(){
  const n=W<760?2:3;
  const xs=n===2?[0.62,0.85]:[0.55,0.72,0.88];
  for(const f of xs)spawnBuilding(W*f);
  spawnCar(W*0.42);spawnCar(W*0.47);
  spawnTitan(W*0.26,'titan');
}

/* ============================================================
   INPUT
   ============================================================ */
const toastEl=document.getElementById('toast');
let toastT=null;
function toast(msg){
  toastEl.textContent=msg;toastEl.style.opacity=1;
  clearTimeout(toastT);
  toastT=setTimeout(()=>toastEl.style.opacity=0,1400);
}
document.querySelectorAll('#panel button[data-tool]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    tool=btn.dataset.tool;
    document.querySelectorAll('#panel button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  });
});
document.getElementById('resetBtn').addEventListener('click',()=>{audio();resetWorld();});
function evPos(e){
  const r=cv.getBoundingClientRect();
  return{x:e.clientX-r.left,y:e.clientY-r.top};
}
function releaseGrab(){
  if(grab){
    Composite.remove(world,grab.cons);
    if(grab.body.plugin&&grab.body.plugin.titan)grab.body.plugin.titan.grabbed=false;
    grab=null;
  }
}
cv.addEventListener('pointerdown',e=>{
  audio();
  e.preventDefault();
  const p=evPos(e);
  if(tool==='grab'){
    let found=Query.point(Composite.allBodies(world),p).filter(b=>b!==groundBody);
    if(!found.length)return;
    /* prefer titan parts, then cars/bombs, then bricks */
    found.sort((a,b)=>{
      const pr=x=>x.plugin?(x.plugin.titanPart?0:(x.plugin.car||x.plugin.bomb?1:2)):3;
      return pr(a)-pr(b);
    });
    const b=found[0];
    if(b.plugin&&b.plugin.brick&&b.isStatic)wakeBrick(b);
    if(b.isStatic)return;
    Sleeping.set(b,false);
    const local=rot(-b.angle,Vector.sub(p,b.position));
    const cons=Constraint.create({pointA:p,bodyB:b,pointB:local,
      stiffness:0.12,damping:0.10,length:0});
    Composite.add(world,cons);
    grab={cons,body:b};
    if(b.plugin&&b.plugin.titan)b.plugin.titan.grabbed=true;
    cv.setPointerCapture(e.pointerId);
  }
  else if(tool==='titan')spawnTitan(clamp(p.x,120,W-120),'titan');
  else if(tool==='ape')spawnTitan(clamp(p.x,120,W-120),'ape');
  else if(tool==='drax')spawnTitan(clamp(p.x,120,W-120),'drax');
  else if(tool==='nuke')spawnNuke(p.x);
  else if(tool==='building')spawnBuilding(p.x);
  else if(tool==='bomb')spawnBomb(p.x,Math.min(p.y,groundY-16));
  else if(tool==='breath')triggerBreath(p);
  else if(tool==='car')spawnCar(p.x);
});
window.addEventListener('pointermove',e=>{
  if(grab){
    const p=evPos(e);
    grab.cons.pointA.x=clamp(p.x,-100,W+100);
    grab.cons.pointA.y=clamp(p.y,-200,H+100);
  }
});
window.addEventListener('pointerup',releaseGrab);
window.addEventListener('pointercancel',releaseGrab);
cv.addEventListener('contextmenu',e=>e.preventDefault());

/* ============================================================
   MAIN LOOP
   ============================================================ */
let lastT=0,acc=0;
function tick(ts){
  requestAnimationFrame(tick);
  if(!lastT)lastT=ts;
  let dt=ts-lastT;lastT=ts;
  if(dt>100)dt=100;
  acc+=dt;
  const now=performance.now();
  let steps=0;
  while(acc>=16.666&&steps<3){
    frame++;
    for(const t of titans){muscles(t,now);breathStep(t,now);}
    /* bombs fuse */
    for(let i=bombs.length-1;i>=0;i--){
      const b=bombs[i];
      if(now-b.plugin.born>b.plugin.fuse){
        bombs.splice(i,1);
        Composite.remove(world,b);
        if(grab&&grab.body===b)releaseGrab();
        explode(b.position.x,b.position.y);
      }
    }
    for(let i=nukes.length-1;i>=0;i--){
      if(nukes[i].position.y>groundY-28)detonateNuke(nukes[i]);
    }
    Engine.update(engine,16.666);
    checkConstraints();
    stepParticles();
    if(frame%80===0)cull();
    acc-=16.666;steps++;
  }
  if(acc>50)acc=0;
  render(now);
}
function render(now){
  const shx=(Math.random()*2-1)*shake,shy=(Math.random()*2-1)*shake;
  shake*=0.86;if(shake<0.25)shake=0;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.drawImage(bgSky,0,0);
  ctx.save();ctx.translate(shx*0.25,shy*0.25);ctx.drawImage(bgFar,0,0);ctx.restore();
  ctx.save();ctx.translate(shx*0.55,shy*0.55);ctx.drawImage(bgNear,0,0);drawBeacons(now);ctx.restore();
  ctx.save();
  ctx.translate(shx,shy);
  ctx.drawImage(streetC,0,groundY-7);
  /* bricks */
  const all=Composite.allBodies(world);
  for(const b of all){
    if(b.plugin&&b.plugin.brick)drawBrick(b);
  }
  for(const b of cars)drawCar(b);
  for(const b of bombs)drawBomb(b,now);
  for(const b of nukes){
    ctx.save();
    ctx.translate(b.position.x,b.position.y);
    ctx.rotate(b.angle);
    ctx.drawImage(nukeSpr,-17,-32);
    ctx.restore();
  }
  for(const t of titans)drawTitanReal(t,now);
  drawParticles();
  ctx.restore();
  ctx.drawImage(vignetteC,0,0);
  if(flash>0){
    ctx.fillStyle=`rgba(255,250,238,${Math.min(1,flash).toFixed(3)})`;
    ctx.fillRect(0,0,W,H);
    flash-=0.022;
  }
}

/* ============================================================
   BOOT
   ============================================================ */
function sizeCanvas(){
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W;cv.height=H;
  groundY=H-58;
  S=clamp(H/860,0.55,1.05);
}
let resizeT=null;
window.addEventListener('resize',()=>{
  clearTimeout(resizeT);
  resizeT=setTimeout(()=>{
    sizeCanvas();buildAllKaiju();buildBackground();resetWorld();
  },350);
});
sizeCanvas();
buildAllKaiju();
buildBackground();
buildStatics();
defaultScene();
requestAnimationFrame(tick);

/* debug / test hooks */
window.TS={engine,world,get titans(){return titans;},get buildings(){return buildings;},
  spawnTitan,spawnBuilding,spawnBomb,spawnCar,spawnNuke,explode,nukeExplode,triggerBreath,resetWorld,
  get groundY(){return groundY;},get T(){return DIMS.titan;},get DIMS(){return DIMS;},
  SPECIES,get S(){return S;}};
})();
